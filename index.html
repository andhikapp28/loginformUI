<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bad UI Login - Shoot to Type</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hud">
      <div class="brand"></div>
    </header>

    <main>
      <section class="panel">
        <div class="fields">
          <button class="field is-active" id="usernameField" data-field="username" type="button">
            <span class="field-label">Username</span>
            <span class="field-value" id="usernameDisplay"></span>
          </button>
          <button class="field" id="passwordField" data-field="password" type="button">
            <span class="field-label">Password</span>
            <span class="field-value" id="passwordDisplay"></span>
          </button>
        </div>

        <div class="controls-row">
          <button id="backspaceBtn" class="small-btn" type="button">Hapus 1</button>
          <button id="clearBtn" class="small-btn" type="button">Reset</button>
          <button id="loginBtn" class="small-btn login-inline" type="button" aria-label="Tombol login">Login</button>
        </div>

        <p id="statusText" class="status">Tembak Karakternya buat ngisi form login!</p>
      </section>

      <section id="arena" aria-label="Arena karakter terbang"></section>
    </main>

    <div id="resultModal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <p id="modalMessage"></p>
        <button id="closeModalBtn" type="button" class="small-btn">Tutup</button>
      </div>
    </div>

    <a
      class="github-link"
      href="https://github.com/andhikapp28/loginformUI.git"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="GitHub Repository"
    >
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path
          fill="currentColor"
          d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38v-1.49c-2.24.49-2.71-1.08-2.71-1.08-.36-.92-.9-1.16-.9-1.16-.73-.5.06-.49.06-.49.81.06 1.24.84 1.24.84.71 1.24 1.89.88 2.35.67.07-.53.28-.89.5-1.1-1.78-.2-3.64-.9-3.64-4.03 0-.9.32-1.63.84-2.2-.08-.2-.36-1.02.08-2.12 0 0 .69-.22 2.26.84A7.77 7.77 0 0 1 8 4.76c.69 0 1.39.09 2.04.27 1.56-1.06 2.26-.84 2.26-.84.44 1.1.16 1.92.08 2.12.52.57.84 1.3.84 2.2 0 3.14-1.87 3.83-3.66 4.03.29.25.54.73.54 1.48v2.19c0 .21.14.46.55.38A8 8 0 0 0 8 0Z"
        ></path>
      </svg>
    </a>

    <script src="script.js"></script>
  </body>
</html>
